version: "3"

# .env.local (優先) または .env から環境変数を読み込む。
# これにより下の vars: セクションの {{.GCP_PROJECT}} などが
# .env.local に書いた実際の値を自動的に拾うようになる。
# (このdotenv宣言がないと、Taskfileは.envファイルを一切参照せず、
#  常に下記の | default "..." のプレースホルダーが使われてしまう)
dotenv: ['.env.local', '.env']

vars:
  GCP_PROJECT: '{{.GCP_PROJECT | default "your-gcp-project-id"}}'
  GCP_REGION: '{{.GCP_REGION | default "asia-northeast1"}}'
  # Cloud Run (Webhookレシーバー)
  GCP_WEBHOOK_SERVICE: '{{.GCP_WEBHOOK_SERVICE | default "github-webhook-receiver"}}'
  # Cloud Run (ADKエージェントワーカー)
  GCP_WORKER_SERVICE: '{{.GCP_WORKER_SERVICE | default "adk-agent-worker"}}'
  # Pub/Sub
  GCP_PUBSUB_TOPIC: '{{.GCP_PUBSUB_TOPIC | default "github-issues"}}'
  GCP_PUBSUB_SUBSCRIPTION: '{{.GCP_PUBSUB_SUBSCRIPTION | default "github-issues-worker-sub"}}'
  # Artifact Registry
  GCP_ARTIFACT_REPO: '{{.GCP_ARTIFACT_REPO | default "devops-ai-agent"}}'
  # GitHub App (PATを使わないための認証方式。.env.local で設定する)
  GITHUB_APP_ID: '{{.GITHUB_APP_ID | default ""}}'
  # 処理を許可するリポジトリのカンマ区切りリスト (owner/repo,owner/repo)。
  # 空のままだとAppをインストールした全リポジトリを許可するので、
  # Any accountにインストール可能にしている場合は設定を推奨。
  ALLOWED_REPOS: '{{.ALLOWED_REPOS | default ""}}'
  # Docker
  WEBHOOK_IMAGE: '{{.GCP_REGION}}-docker.pkg.dev/{{.GCP_PROJECT}}/{{.GCP_ARTIFACT_REPO}}/webhook-receiver'
  WORKER_IMAGE: '{{.GCP_REGION}}-docker.pkg.dev/{{.GCP_PROJECT}}/{{.GCP_ARTIFACT_REPO}}/adk-agent-worker'
  # Cloudflare (構成B)
  CF_WORKER_NAME: '{{.CF_WORKER_NAME | default "github-webhook-receiver"}}'

tasks:
  # ─────────────────────────────────────────────
  # 共通
  # ─────────────────────────────────────────────
  install:
    desc: 全パッケージの依存関係をインストール
    cmds:
      - pnpm install
      - pnpm --filter ./gcp-webhook install
      - pnpm --filter ./cloudflare-workers install
      - pnpm --filter ./local-worker install
      - pnpm --filter ./local-dev/cf-queue-mock install
      - pnpm --filter ./local-dev/gcp-pubsub-relay install
      - pnpm --filter ./local-test install

  lint:
    desc: 全パッケージの型チェック
    cmds:
      - pnpm --filter ./gcp-webhook exec tsc --noEmit
      - pnpm --filter ./cloudflare-workers exec tsc --noEmit
      - pnpm --filter ./local-worker exec tsc --noEmit
      - pnpm --filter ./local-dev/cf-queue-mock exec tsc --noEmit
      - pnpm --filter ./local-dev/gcp-pubsub-relay exec tsc --noEmit
      - pnpm --filter ./local-test exec tsc --noEmit
      - tsc --noEmit -p tsconfig.root.json

  # ─────────────────────────────────────────────
  # Docker: Webhookレシーバー (Cloud Run)
  # ─────────────────────────────────────────────
  docker:build:webhook:
    desc: WebhookレシーバーのDockerイメージをビルド
    cmds:
      - docker build -f Dockerfile.webhook -t {{.WEBHOOK_IMAGE}}:latest .

  docker:build:worker:
    desc: ADKエージェントワーカーのDockerイメージをビルド
    cmds:
      - docker build -f Dockerfile.worker -t {{.WORKER_IMAGE}}:latest .

  docker:build:all:
    desc: 全Dockerイメージをビルド
    cmds:
      - task: docker:build:webhook
      - task: docker:build:worker

  docker:push:all:
    desc: 全イメージをArtifact Registryにpush
    deps: [docker:build:all]
    cmds:
      - docker push {{.WEBHOOK_IMAGE}}:latest
      - docker push {{.WORKER_IMAGE}}:latest

  docker:run:worker:local:
    desc: ワーカーをローカルで実行 (.envから環境変数を読み込み)
    cmds:
      - docker run --rm --env-file .env.local {{.WORKER_IMAGE}}:latest

  # ─────────────────────────────────────────────
  # 構成A: Google Cloud フルネイティブ
  # ─────────────────────────────────────────────
  gcp:auth:
    desc: gcloudとDockerの認証設定
    cmds:
      - gcloud auth login
      - gcloud config set project {{.GCP_PROJECT}}
      - gcloud auth configure-docker {{.GCP_REGION}}-docker.pkg.dev

  gcp:setup:
    desc: GCPの初期リソースを一括作成
    preconditions:
      - sh: '[ "{{.GCP_PROJECT}}" != "your-gcp-project-id" ]'
        msg: |
          ❌ GCP_PROJECT が未設定です (プレースホルダーのままです)。
             .env.local に実際のGCPプロジェクトIDを設定してください:
               GCP_PROJECT=あなたのプロジェクトID
             プロジェクトIDの確認方法・作成方法は README.md の
             「GCPの初期セットアップ (Google Cloud Console)」を参照してください。
    cmds:
      - tsx scripts/deploy.ts gcp:setup
        --project {{.GCP_PROJECT}}
        --region {{.GCP_REGION}}
        --topic {{.GCP_PUBSUB_TOPIC}}
        --artifact-repo {{.GCP_ARTIFACT_REPO}}

  gcp:deploy:webhook:
    desc: WebhookレシーバーをCloud Runにデプロイ
    deps: [docker:build:webhook]
    preconditions:
      - sh: '[ "{{.GCP_PROJECT}}" != "your-gcp-project-id" ]'
        msg: "❌ GCP_PROJECT が未設定です。.env.local に GCP_PROJECT=あなたのプロジェクトID を設定してください (README.md 参照)"
    cmds:
      - docker push {{.WEBHOOK_IMAGE}}:latest
      - tsx scripts/deploy.ts gcp:deploy-webhook
        --project {{.GCP_PROJECT}}
        --region {{.GCP_REGION}}
        --service {{.GCP_WEBHOOK_SERVICE}}
        --image {{.WEBHOOK_IMAGE}}:latest
        --topic {{.GCP_PUBSUB_TOPIC}}
        --allowed-repos "{{.ALLOWED_REPOS}}"

  gcp:deploy:worker:
    desc: ADKエージェントワーカーをCloud Runにデプロイ
    deps: [docker:build:worker]
    preconditions:
      - sh: '[ "{{.GCP_PROJECT}}" != "your-gcp-project-id" ]'
        msg: "❌ GCP_PROJECT が未設定です。.env.local に GCP_PROJECT=あなたのプロジェクトID を設定してください (README.md 参照)"
      - sh: '[ -n "{{.GITHUB_APP_ID}}" ]'
        msg: |
          ❌ GITHUB_APP_ID が未設定です。
             .env.local に GitHub AppのApp IDを設定してください:
               GITHUB_APP_ID=123456
             GitHub Appの作成方法は README.md の
             「GitHub Appを使った他リポジトリへの展開」を参照してください。
    cmds:
      - docker push {{.WORKER_IMAGE}}:latest
      - tsx scripts/deploy.ts gcp:deploy-worker
        --project {{.GCP_PROJECT}}
        --region {{.GCP_REGION}}
        --service {{.GCP_WORKER_SERVICE}}
        --image {{.WORKER_IMAGE}}:latest
        --topic {{.GCP_PUBSUB_TOPIC}}
        --subscription {{.GCP_PUBSUB_SUBSCRIPTION}}
        --github-app-id {{.GITHUB_APP_ID}}

  gcp:deploy:all:
    desc: GCP全リソースをセットアップ&デプロイ
    cmds:
      - task: gcp:setup
      - task: gcp:deploy:webhook
      - task: gcp:deploy:worker
    summary: |
      Google Cloud への完全デプロイを実行します。
      実行後、出力されるWebhook URLをGitHubリポジトリのWebhook設定に登録してください。

  gcp:logs:webhook:
    desc: WebhookレシーバーのCloud Runログを表示
    cmds:
      - gcloud run services logs read {{.GCP_WEBHOOK_SERVICE}} --project={{.GCP_PROJECT}} --region={{.GCP_REGION}} --limit=50

  gcp:logs:worker:
    desc: ADKワーカーのCloud Runログを表示
    cmds:
      - gcloud run services logs read {{.GCP_WORKER_SERVICE}} --project={{.GCP_PROJECT}} --region={{.GCP_REGION}} --limit=50

  gcp:pubsub:publish:test:
    desc: Pub/Subにテストメッセージを送信 (ローカルデバッグ用)
    cmds:
      - |
        gcloud pubsub topics publish {{.GCP_PUBSUB_TOPIC}} \
          --project={{.GCP_PROJECT}} \
          --message='{"issueNumber":1,"issueTitle":"テストIssue","issueBody":"テスト本文","issueAuthor":"test-user","repoFullName":"owner/repo","triggeredAt":"{{now}}"}'

  # ─────────────────────────────────────────────
  # 構成B: Cloudflare + ローカルLLM
  # ─────────────────────────────────────────────
  cf:dev:
    desc: Cloudflare Workerをローカル開発モードで起動
    dir: cloudflare-workers
    cmds:
      - pnpm wrangler dev

  cf:deploy:
    desc: Cloudflare Workerをデプロイ
    cmds:
      - tsx scripts/deploy.ts cf:deploy

  cf:secret:set:
    desc: Cloudflare Workerにシークレットを設定
    dir: cloudflare-workers
    cmds:
      - cmd: echo "=== GITHUB_WEBHOOK_SECRET を設定 ===" && pnpm wrangler secret put GITHUB_WEBHOOK_SECRET
      - cmd: echo "=== GITHUB_TOKEN を設定 ===" && pnpm wrangler secret put GITHUB_TOKEN
      - cmd: echo "=== LOCAL_WORKER_TOKEN を設定 ===" && pnpm wrangler secret put LOCAL_WORKER_TOKEN

  cf:tail:
    desc: Cloudflare WorkerのリアルタイムLogを表示
    dir: cloudflare-workers
    cmds:
      - pnpm wrangler tail {{.CF_WORKER_NAME}}

  # ─────────────────────────────────────────────
  # ローカル動作確認 (構成B: Cloudflare + ローカルLLM)
  # ─────────────────────────────────────────────
  dev:cf:up:
    desc: 構成Bのローカル開発環境を起動 (cf-worker-dev / cf-queue-mock / local-gpu-worker)
    cmds:
      - docker compose -f docker-compose.dev.cloudflare.yml up

  dev:cf:down:
    desc: 構成Bのローカル開発環境を停止
    cmds:
      - docker compose -f docker-compose.dev.cloudflare.yml down

  test:cf:dispatch:
    desc: "[構成B] GitHub Actions → Cloudflare Worker /dispatch へダミーリクエストを送信"
    cmds:
      - tsx local-test/src/test-cloudflare-flow.ts dispatch {{.CLI_ARGS}}

  test:cf:queue:
    desc: "[構成B] Cloudflare Queues モックに直接ダミーメッセージを投入"
    cmds:
      - tsx local-test/src/test-cloudflare-flow.ts queue {{.CLI_ARGS}}

  test:cf:worker:
    desc: "[構成B] 自前GPUワーカー /run に直接ダミーリクエストを送信"
    cmds:
      - tsx local-test/src/test-cloudflare-flow.ts worker {{.CLI_ARGS}}

  test:cf:e2e:
    desc: "[構成B] 一気通貫のダミーリクエストテスト (dispatch → Queue → Worker)"
    cmds:
      - tsx local-test/src/test-cloudflare-flow.ts e2e {{.CLI_ARGS}}

  # ─────────────────────────────────────────────
  # ローカル動作確認 (構成A: Google Cloud)
  # ─────────────────────────────────────────────
  dev:gcp:up:
    desc: 構成Aのローカル開発環境を起動 (pubsub-emulator / gcp-webhook-dev / gcp-pubsub-relay / adk-worker-dev)
    cmds:
      - docker compose -f docker-compose.dev.gcp.yml up

  dev:gcp:down:
    desc: 構成Aのローカル開発環境を停止
    cmds:
      - docker compose -f docker-compose.dev.gcp.yml down

  test:gcp:webhook:
    desc: "[構成A] 署名付きダミーGitHub Webhookをgcp-webhook /webhook へ送信"
    cmds:
      - tsx local-test/src/test-gcp-flow.ts webhook {{.CLI_ARGS}}

  test:gcp:pubsub:
    desc: "[構成A] Pub/Subエミュレータに直接ダミーメッセージをパブリッシュ"
    cmds:
      - tsx local-test/src/test-gcp-flow.ts pubsub {{.CLI_ARGS}}

  test:gcp:worker:
    desc: "[構成A] ADKワーカー /worker に直接ダミーリクエストを送信"
    cmds:
      - tsx local-test/src/test-gcp-flow.ts worker {{.CLI_ARGS}}

  test:gcp:e2e:
    desc: "[構成A] 一気通貫のダミーリクエストテスト (webhook → Pub/Sub → relay → Worker)"
    cmds:
      - tsx local-test/src/test-gcp-flow.ts e2e {{.CLI_ARGS}}
